<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>
  <link rel="stylesheet" href="login.css">
  <link rel="icon" href="blueLogo.png" type="image/png">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    (function () {
      emailjs.init({ publicKey: 'oYC9senSf6TB7z8W7'});
    })();
  </script>
  <script type="module">
    import {login} from './authentication.js';
    window.login = login;
  </script>
  <script type="module">
    import {updateFirings, clearFirings} from './admin.js';
    window.updateFirings = updateFirings;
    window.clearFirings = clearFirings;
  </script>
</head>
<body onload="updateFirings()">
  <h2 class="sectionTitle"><span>Login</span></h2>
  <br>
  <div class="box">
    <label>Email</label>
    <input type="text" id="email" placeholder="Your Email">
    <label>Password</label>
    <input type="password" id="password" placeholder="Your Password">
    <button type="submit" onclick="login()">Submit</button>
    <button type="submit" onclick="window.location.href='signup.html'">Sign Up</button>
  </div>
</body>
</html>
